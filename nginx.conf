server {
    listen 80;
    server_name _;

    # Include default MIME types, then add .mjs (not mapped by default)
    include /etc/nginx/mime.types;
    types {
        application/javascript mjs;
    }

    root /usr/share/nginx/html;
    index index-en.html index.html;

    # Compression
    gzip on;
    gzip_types text/css application/javascript application/json application/rdf+xml text/turtle image/svg+xml;
    gzip_min_length 256;

    # Serve generated Widoco documentation
    location / {
        try_files $uri $uri/ =404;
    }

    # Suppress favicon.ico 404
    location = /favicon.ico {
        return 204;
        access_log off;
    }

    # Cache static assets
    location ~* \.(mjs|js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Fuseki proxy — auth header injected here so Widoco never handles credentials.
    # Use http://widoco-web/fuseki/<dataset>/data as the -ontURI in Widoco.
    location /fuseki/ {
        proxy_pass ${FUSEKI_URL}/;
        proxy_set_header Authorization "${FUSEKI_AUTH_HEADER}";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }
}
